<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnLogin = document.getElementById('btn-login');
            const btnRegister = document.getElementById('btn-register');
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');

            function switchTab(tab) {
                if (tab === 'login') {
                    // Update buttons
                    btnLogin.classList.replace('tab-inactive', 'tab-active');
                    btnRegister.classList.replace('tab-active', 'tab-inactive');
                    
                    // Update forms
                    formLogin.classList.remove('opacity-0', 'pointer-events-none', 'z-0');
                    formLogin.classList.add('opacity-100', 'z-10');
                    
                    formRegister.classList.remove('opacity-100', 'z-10');
                    formRegister.classList.add('opacity-0', 'pointer-events-none', 'z-0');
                } else {
                    // Update buttons
                    btnRegister.classList.replace('tab-inactive', 'tab-active');
                    btnLogin.classList.replace('tab-active', 'tab-inactive');
                    
                    // Update forms
                    formRegister.classList.remove('opacity-0', 'pointer-events-none', 'z-0');
                    formRegister.classList.add('opacity-100', 'z-10');
                    
                    formLogin.classList.remove('opacity-100', 'z-10');
                    formLogin.classList.add('opacity-0', 'pointer-events-none', 'z-0');
                }
            }

            btnLogin.addEventListener('click', () => switchTab('login'));
            btnRegister.addEventListener('click', () => switchTab('register'));
        });
    </script>
